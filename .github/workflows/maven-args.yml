name: Maven download progress / MAVEN_ARGS (#1053)

# Verifies the new `show-download-progress` input, which controls whether the
# action injects `-ntp` (--no-transfer-progress) into MAVEN_ARGS.
#   - default / false -> MAVEN_ARGS contains -ntp (quiet transfer logs)
#   - true            -> MAVEN_ARGS is left untouched

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  default-suppresses-progress:
    name: default -> MAVEN_ARGS has -ntp (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/setup-java@a50fdccef19f861401a6f00b7caa2abf98504acb # main after v5.4.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Assert MAVEN_ARGS contains -ntp
        shell: bash
        run: |
          set -euo pipefail
          echo "MAVEN_ARGS='${MAVEN_ARGS:-}'"
          case " ${MAVEN_ARGS:-} " in
            *" -ntp "*) echo "OK: -ntp present" ;;
            *) echo "::error::MAVEN_ARGS did not contain -ntp"; exit 1 ;;
          esac

  explicit-false-suppresses-progress:
    name: show-download-progress=false -> -ntp (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/setup-java@a50fdccef19f861401a6f00b7caa2abf98504acb # main after v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          show-download-progress: false
      - name: Assert MAVEN_ARGS contains -ntp
        shell: bash
        run: |
          set -euo pipefail
          echo "MAVEN_ARGS='${MAVEN_ARGS:-}'"
          case " ${MAVEN_ARGS:-} " in
            *" -ntp "*) echo "OK: -ntp present" ;;
            *) echo "::error::MAVEN_ARGS did not contain -ntp"; exit 1 ;;
          esac

  explicit-true-keeps-progress:
    name: show-download-progress=true -> no -ntp (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/setup-java@a50fdccef19f861401a6f00b7caa2abf98504acb # main after v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          show-download-progress: true
      - name: Assert MAVEN_ARGS does NOT contain -ntp
        shell: bash
        run: |
          set -euo pipefail
          echo "MAVEN_ARGS='${MAVEN_ARGS:-}'"
          case " ${MAVEN_ARGS:-} " in
            *" -ntp "*) echo "::error::MAVEN_ARGS unexpectedly contained -ntp"; exit 1 ;;
            *) echo "OK: -ntp absent" ;;
          esac

  real-maven-build-is-quiet:
    name: real mvn build has no transfer progress (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@a50fdccef19f861401a6f00b7caa2abf98504acb # main after v5.4.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Build sample project and check logs
        working-directory: maven-sample-project
        shell: bash
        run: |
          set -euo pipefail
          echo "MAVEN_ARGS='${MAVEN_ARGS:-}'"
          # Force dependency downloads so transfer-progress would show if enabled.
          rm -rf "$HOME/.m2/repository/org/apache/commons/commons-lang3" || true
          mvn -B compile 2>&1 | tee build.log
          if grep -E "Progress \(1\):|[0-9]+/[0-9]+ [kKmM]B" build.log; then
            echo "::error::Transfer progress lines found despite -ntp"
            exit 1
          fi
          echo "OK: no transfer progress lines in build log"
