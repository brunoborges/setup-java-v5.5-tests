name: Tencent Kona JDK (#672)

# Verifies the new `kona` distribution added after v5.4.0.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kona-baseline-unsupported:
    name: 'BASELINE v5.4.0: kona is NOT supported - ubuntu-latest'
    runs-on: ubuntu-latest
    steps:
      - name: Try Tencent Kona with published v5.4.0 (expected to fail)
        id: setup-java
        continue-on-error: true
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0 (published)
        with:
          distribution: kona
          java-version: '21'

      - name: Assert v5.4.0 rejected the kona distribution
        shell: bash
        run: |
          set -euo pipefail
          echo "setup-java outcome: ${{ steps.setup-java.outcome }}"
          if [ "${{ steps.setup-java.outcome }}" != "failure" ]; then
            echo "::error::expected v5.4.0 to fail on distribution 'kona', but it did not"
            exit 1
          fi
          echo "OK (baseline): v5.4.0 does not support 'kona', as expected"

  kona:
    name: 'CURRENT: kona ${{ matrix.version }} - ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        version: ['21', '17', '11', '8']
    steps:
      - name: Set up Tencent Kona JDK
        id: setup-java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: kona
          java-version: ${{ matrix.version }}

      - name: Print resolved version
        run: |
          echo "distribution: ${{ steps.setup-java.outputs.distribution }}"
          echo "version:      ${{ steps.setup-java.outputs.version }}"
          echo "path:         ${{ steps.setup-java.outputs.path }}"

      - name: Verify java is Kona and on PATH
        shell: bash
        run: |
          set -euo pipefail
          java -version 2>&1 | tee version.txt
          # Kona builds report the vendor/version string containing "Kona"
          if ! grep -qi "kona" version.txt; then
            echo "::error::java -version output does not mention Kona"
            exit 1
          fi
          echo "JAVA_HOME=${JAVA_HOME}"
          test -x "${JAVA_HOME}/bin/java"
