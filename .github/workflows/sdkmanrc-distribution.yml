name: .sdkmanrc distribution auto-detect (#975)

# Verifies the enhancement from PR #975: setup-java can now detect the Java
# distribution from the SDKMAN identifier suffix in a `.sdkmanrc` file
# (e.g. `java=21.0.5-tem` -> temurin), making the `distribution` input optional.
#
#   - CURRENT: `.sdkmanrc` with a `-tem` suffix and NO `distribution` input
#     installs Temurin 21 automatically.
#   - BASELINE v5.4.0: the same setup (no `distribution` input) fails, because
#     v5.4.0 still requires `distribution` even when `.sdkmanrc` carries a suffix.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdkmanrc-autodetect-current:
    name: 'CURRENT: distribution auto-detected from .sdkmanrc - ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Create a .sdkmanrc with a Temurin (-tem) identifier
        shell: bash
        run: printf 'java=21.0.5-tem\n' > .sdkmanrc

      - name: Install JDK from .sdkmanrc without a distribution input
        id: setup-java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # main (latest)
        with:
          java-version-file: .sdkmanrc

      - name: Assert Temurin 21 was auto-detected and installed
        shell: bash
        run: |
          set -euo pipefail
          echo "outputs.version=${{ steps.setup-java.outputs.version }}"
          echo "outputs.distribution=${{ steps.setup-java.outputs.distribution }}"
          echo "JAVA_HOME=${JAVA_HOME:-}"

          # 1) The default java must be version 21.
          java -version 2>&1 | grep -E '"21|version "21' >/dev/null \
            || { echo "::error::default java is not 21"; exit 1; }
          echo "OK: Java 21 is installed and default"

          # 2) The distribution must have been detected as Temurin from the -tem suffix.
          if ! java -version 2>&1 | grep -iq 'temurin'; then
            echo "::error::installed JDK does not look like Temurin"
            java -version 2>&1 || true
            exit 1
          fi
          echo "OK: distribution auto-detected as Temurin from .sdkmanrc"

  sdkmanrc-baseline:
    name: 'BASELINE v5.4.0: distribution still required for .sdkmanrc - ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Create a .sdkmanrc with a Temurin (-tem) identifier
        shell: bash
        run: printf 'java=21.0.5-tem\n' > .sdkmanrc

      - name: Try .sdkmanrc without a distribution input on published v5.4.0 (expected to fail)
        id: setup-java
        continue-on-error: true
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0 (published)
        with:
          java-version-file: .sdkmanrc

      - name: Assert v5.4.0 required the distribution input
        shell: bash
        run: |
          set -euo pipefail
          echo "setup-java outcome: ${{ steps.setup-java.outcome }}"
          if [ "${{ steps.setup-java.outcome }}" != "failure" ]; then
            echo "::error::expected v5.4.0 to fail without a 'distribution' input, but it did not"
            exit 1
          fi
          echo "OK (baseline): v5.4.0 does not auto-detect the distribution from .sdkmanrc"
